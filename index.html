<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/Tap2Log/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Tap2Log - Configuration management tool">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- PWA Meta Tags -->
  <meta name="theme-color" content="#2196F3">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="tap2log">
  
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script>
    // Intercept Flutter's loader to prevent it from registering its own
    // deprecated service worker, which would conflict with our sw.js.
    window._flutter = window._flutter || {};
    Object.defineProperty(window._flutter, 'loader', {
      enumerable: true, configurable: true,
      get() { return this._loaderValue; },
      set(v) {
        this._loaderValue = v;
        if (v && v.load) {
          const orig = v.load.bind(v);
          v.load = ({ serviceWorkerSettings: _, ...rest } = {}) => {
            // Force local CanvasKit instead of CDN (needed for offline).
            rest.config = { ...rest.config, canvasKitBaseUrl: 'canvaskit/' };
            return orig(rest);
          };
        }
      }
    });

    // Register our own service worker.
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('sw.js'));
    }
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
